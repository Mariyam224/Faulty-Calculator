<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faulty Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utils.css">
</head>

<body>
    <div class="faulty-box">
        <div id="head">
            <div id="inside-div">Faulty Calculator</div>
        </div>
        <div id="calces">
            <label class="toggle">
                <input type="checkbox">
                <span></span>
            </label>
        </div>
        <input class="result" type="text">
        <div class="cal-box ">
            <div class="row">
                <button class="btns">AC</button>
                <button class="btns">%</button>
                <button class="btns">x</button>
                <button class="btns">/</button>
            </div>
            <div class="row">
                <button class="btns">7</button>
                <button class="btns">8</button>
                <button class="btns">9</button>
                <button class="btns">*</button>
            </div>
            <div class="row">
                <button class="btns">4</button>
                <button class="btns">5</button>
                <button class="btns">6</button>
                <button class="btns">-</button>
            </div>
            <div class="row">
                <button class="btns">1</button>
                <button class="btns">2</button>
                <button class="btns">3</button>
                <button class="btns">+</button>
            </div>
            <div class="row">
                <button class="btns">0</button>
                <button class="btns">^</button>
                <button class="btns">.</button>
                <button class="btns">=</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
